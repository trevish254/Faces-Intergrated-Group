<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us — Faces Integrated Group</title>
  <meta name="description" content="Get in touch with Faces Integrated Group. We craft bold ideas and ship them as products." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["'Inter'", 'sans-serif'],
            serif: ["'Instrument Serif'", 'serif'],
          },
        },
      },
    }
  </script>
  <style>
      * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
      body { margin: 0; padding: 0; background: white; }
      video { display: block; }
      @media (max-width: 768px) {
        .desktop-nav-links { display: none !important; }
      }
    </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const VIDEO_URL = "./src/assets/WhatsApp Video 2026-07-24 at 4.55.01 AM (1).mp4";
    const SERVICES = [
      'Brand Activation', 'Retail Merchandising', 'Event Management',
      'Experiential Marketing', 'Market Auditing', 'Creative Production',
      'FMCG Campaigns', 'Corporate Events', 'Other'
    ];

    // ── Social Button ──────────────────────────────────────────────────────────
    function SocialBtn({ icon, bg, color }) {
      return (
        <a href="#" style={{
          width: 32, height: 32, borderRadius: 12,
          background: bg, color: color,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          textDecoration: 'none', fontSize: 13, transition: 'opacity 0.2s',
          flexShrink: 0,
        }}
        onMouseEnter={e => e.currentTarget.style.opacity = '0.7'}
        onMouseLeave={e => e.currentTarget.style.opacity = '1'}
        >
          <i className={icon}></i>
        </a>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // NAVBAR  (matches homepage FIG navbar)
    // ─────────────────────────────────────────────────────────────────────────
    const Navbar = () => {
      const [isOpen, setIsOpen] = useState(false);

      const navLinks = [
        { label: 'Services',    href: '../services/index.html' },
        { label: 'Blog',        href: '../blog/index.html' },
        { label: 'About Us',    href: '../about-us/index.html' },
        { label: 'Contact Us',  href: '../contact-us/index.html' },
        { label: '← Home',     href: '../index.html' },
      ];

      return (
        <div style={{
          width:'100%', position:'fixed', zIndex:99,
          padding:'20px 25px', display:'flex',
          alignItems:'flex-start', justifyContent:'space-between',
          top:0, left:0, pointerEvents:'none',
        }}>
          {/* Logo */}
          <div style={{height:70, overflow:'hidden', pointerEvents:'auto'}}>
            <a href="../index.html">
              <img
                src="../img/Faces-Integrated-Group__1_-removebg-preview.webp"
                alt="FIG Logo"
                style={{height:70, display:'block'}}
              />
            </a>
          </div>

          {/* Right side */}
          <div style={{display:'flex', alignItems:'center', gap:24, pointerEvents:'auto'}}>

            {/* Desktop links — hidden on mobile via Tailwind 'hidden md:flex' */}
            <div style={{
              flexDirection:'row',
              alignItems:'center',
              gap:24,
              background:'rgba(255,255,255,0.88)',
              backdropFilter:'blur(10px)',
              WebkitBackdropFilter:'blur(10px)',
              padding:'12px 20px', borderRadius:50,
              boxShadow:'0 4px 16px rgba(0,0,0,0.06)',
              border:'1px solid rgba(0,0,0,0.06)',
            }} className="desktop-nav-links hidden md:flex">
              {navLinks.map(link => (
                <a key={link.label} href={link.href} style={{
                  textTransform:'uppercase', textDecoration:'none',
                  color:'#333', fontWeight:500, fontSize:13,
                  fontFamily:'Helvetica, sans-serif',
                  transition:'color 200ms',
                  whiteSpace:'nowrap',
                }}
                onMouseEnter={e => e.currentTarget.style.color='#000'}
                onMouseLeave={e => e.currentTarget.style.color='#333'}
                >
                  {link.label}
                </a>
              ))}
            </div>

            {/* Icons pill (mobile menu) */}
            <div style={{
              padding:'10px', borderRadius:50,
              background:'rgba(247,247,247,0.85)',
              backdropFilter:'blur(8px)',
              display:'flex', alignItems:'center',
            }}>
              <i
                className="ri-menu-fill"
                style={{
                  fontSize:18, margin:'0 16px', fontWeight:100,
                  cursor:'pointer',
                }}
                onClick={() => setIsOpen(!isOpen)}
              />
              <i className="ri-shopping-cart-2-line" style={{fontSize:18, margin:'0 16px', fontWeight:100}} />
            </div>

            {/* Mobile dropdown */}
            {isOpen && (
              <div style={{
                display:'flex',
                flexDirection:'column',
                position:'absolute',
                top:80, right:40,
                background:'rgba(255,255,255,0.97)',
                backdropFilter:'blur(10px)',
                WebkitBackdropFilter:'blur(10px)',
                padding:'20px', borderRadius:12,
                boxShadow:'0 10px 30px rgba(0,0,0,0.1)',
                gap:20, border:'1px solid rgba(0,0,0,0.05)',
                alignItems:'flex-start', zIndex:999,
              }}>
                {navLinks.map(link => (
                  <a key={link.label} href={link.href} style={{
                    textTransform:'uppercase', textDecoration:'none',
                    color:'#333', fontWeight:500, fontSize:14,
                    fontFamily:'Helvetica, sans-serif',
                  }}
                  onClick={() => setIsOpen(false)}
                  >
                    {link.label}
                  </a>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    };

    // ─────────────────────────────────────────────────────────────────────────
    // FIG FOOTER
    // ─────────────────────────────────────────────────────────────────────────
    const FIGFooter = () => {
      const linkStyle = {
        fontSize:17, color:'#000', textDecoration:'none', fontWeight:500,
        fontFamily:'Helvetica, sans-serif', display:'block',
      };
      const labelStyle = {
        marginBottom:18, fontSize:14, opacity:0.5,
        fontFamily:'Helvetica, sans-serif', textTransform:'uppercase',
      };

      return (
        <footer style={{background:'#f0f0f0', paddingBottom:0}}>
          {/* Main footer row */}
          <div style={{
            display:'flex', alignItems:'flex-start', justifyContent:'space-between',
            flexWrap:'wrap', paddingTop:100, paddingBottom:40,
            paddingLeft:'clamp(20px,4vw,60px)', paddingRight:'clamp(20px,4vw,60px)', gap:40,
          }}>

            {/* Connect column */}
            <div style={{display:'flex', flexDirection:'column', gap:8, minWidth:140}}>
              <p style={labelStyle}>CONNECT WITH US</p>
              {['Facebook','Instagram','Twitter','LinkedIn','YouTube'].map(s => (
                <a key={s} href="javascript:void(0);" style={linkStyle}
                  onMouseEnter={e => e.currentTarget.style.opacity='0.6'}
                  onMouseLeave={e => e.currentTarget.style.opacity='1'}>
                  {s}
                </a>
              ))}
            </div>

            {/* Centre: logo + copyright */}
            <div style={{display:'flex', flexDirection:'column', alignItems:'center', flex:'1 1 260px'}}>
              <img
                src="../img/Faces-Integrated-Group__1_-removebg-preview.webp"
                alt="FIG Logo"
                style={{height:120, objectFit:'contain', filter:'grayscale(1) brightness(0) contrast(1)', opacity:0.15}}
              />
              <div style={{marginTop:32, display:'flex', flexWrap:'wrap', justifyContent:'center', gap:'0 24px'}}>
                {['© FACES INTEGRATED GROUP 2026','TERMS OF USE','PRIVACY POLICY'].map(t => (
                  <a key={t} href="javascript:void(0);"
                    style={{textDecoration:'none', color:'#000', opacity:0.5,
                      fontSize:13, fontFamily:'Helvetica, sans-serif'}}>
                    {t}
                  </a>
                ))}
              </div>
            </div>

            {/* Nitty Gritties column */}
            <div style={{display:'flex', flexDirection:'column', gap:8, alignItems:'flex-end', minWidth:140}}>
              <p style={{...labelStyle, textAlign:'right'}}>THE NITTY GRITTIES</p>
              {['Activation FAQs','Retail Audit FAQs','Event Management','Regional Reach','Careers'].map(l => (
                <a key={l} href="javascript:void(0);" style={{...linkStyle, textAlign:'right'}}
                  onMouseEnter={e => e.currentTarget.style.opacity='0.6'}
                  onMouseLeave={e => e.currentTarget.style.opacity='1'}>
                  {l}
                </a>
              ))}
            </div>
          </div>

          {/* Footer blurb */}
          <div style={{
            width:'70%', margin:'0 auto', paddingTop:40, paddingBottom:40,
            textAlign:'center', borderTop:'1px solid rgba(0,0,0,0.08)',
          }}>
            <p style={{fontSize:16, lineHeight:'1.7', color:'rgba(0,0,0,0.6)', fontFamily:'Helvetica, sans-serif'}}>
              Faces Integrated Group (FIG) is a leading experiential marketing and brand activation agency dedicated to helping businesses build stronger connections with their customers through innovative, results-driven marketing solutions. Guided by our motto &quot;WE BUILD BRANDS&quot;, FIG provides end-to-end brand experience solutions including experiential marketing, retail merchandising, event management, creative production, and market auditing for top FMCG brands and corporate organizations across East Africa.
            </p>
          </div>

          {/* Large watermark */}
          <div style={{width:'100%', textAlign:'center', overflow:'hidden', paddingBottom:24, pointerEvents:'none'}}>
            <h1 style={{
              fontSize:'clamp(48px, 9vw, 9vw)',
              fontWeight:700, color:'rgba(30,50,90,0.08)',
              textTransform:'uppercase', lineHeight:1,
              letterSpacing:'-0.04em', whiteSpace:'nowrap',
              fontFamily:'Helvetica, sans-serif',
            }}>
              Faces Integrated Group
            </h1>
          </div>
        </footer>
      );
    };

    // ── Contact Form ───────────────────────────────────────────────────────────
    function ContactForm() {
      const [selected, setSelected] = useState([]);
      const [name, setName]         = useState('');
      const [email, setEmail]       = useState('');
      const [message, setMessage]   = useState('');
      const [sending, setSending]   = useState(false);
      const [sent, setSent]         = useState(false);

      const toggle = (s) => setSelected(prev =>
        prev.includes(s) ? prev.filter(x => x !== s) : [...prev, s]
      );

      const handleSubmit = async (e) => {
        e.preventDefault();
        setSending(true);
        await new Promise(r => setTimeout(r, 1000));
        setSending(false);
        setSent(true);
      };

      const inputStyle = {
        flex: 1, minWidth: 0, fontSize: 13,
        padding: '10px 12px', borderRadius: 12,
        border: '1px solid #e5e7eb', background: 'transparent',
        outline: 'none', fontFamily: "'Inter', sans-serif",
        color: '#1a1a1a', transition: 'box-shadow 0.2s',
      };

      return (
        <div style={{
          background: '#fff', borderRadius: 24,
          boxShadow: '0 20px 60px rgba(0,0,0,0.18)',
          overflow: 'hidden', padding: '20px 22px',
          display: 'flex', flexDirection: 'column', gap: 16,
          width: '100%',
        }}>
          {sent ? (
            <div style={{display:'flex', flexDirection:'column', alignItems:'center', padding:'24px 0', gap:12, textAlign:'center'}}>
              <div style={{
                width: 48, height: 48, borderRadius: '50%',
                background: '#f0fdf4', display: 'flex',
                alignItems: 'center', justifyContent: 'center',
                fontSize: 22, color: '#16a34a',
              }}>✓</div>
              <div>
                <p style={{margin: '0 0 4px', fontWeight: 600, fontSize: 15, color: '#111'}}>Message received!</p>
                <p style={{margin: 0, fontSize: 13, color: '#6b7280'}}>Our team will be in touch within 24 hours.</p>
              </div>
            </div>
          ) : (
            <>
              <h2 style={{margin:0, fontSize: 20, fontWeight: 700, color: '#111', letterSpacing: '-0.01em'}}>
                Start a conversation 🤝
              </h2>

              {/* Email + socials row */}
              <div style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                gap: 12, background: '#f9fafb', borderRadius: 16,
                padding: '10px 14px',
              }}>
                <div style={{display:'flex', flexDirection:'column', gap: 2, overflow:'hidden'}}>
                  <span style={{fontSize: 11, color: '#9ca3af', fontWeight: 500}}>Drop us a line</span>
                  <a href="mailto:info@facesintegratedgroup.com" style={{
                    fontSize: 13, color: '#2563eb', fontWeight: 600,
                    textDecoration: 'none', whiteSpace: 'nowrap',
                    overflow: 'hidden', textOverflow: 'ellipsis',
                  }}>info@facesintegratedgroup.com</a>
                </div>
                <div style={{display:'flex', gap: 6, flexShrink: 0}}>
                  <SocialBtn icon="ri-twitter-x-line"  bg="#f3f4f6" color="#1a1a1a" />
                  <SocialBtn icon="ri-instagram-line"  bg="#fff0f5" color="#ec4899" />
                  <SocialBtn icon="ri-facebook-line"   bg="#fff7ed" color="#f97316" />
                  <SocialBtn icon="ri-linkedin-line"   bg="#eff6ff" color="#2563eb" />
                </div>
              </div>

              {/* OR divider */}
              <div style={{display:'flex', alignItems:'center', gap: 10}}>
                <div style={{flex:1, height:1, background:'#e5e7eb'}}></div>
                <span style={{fontSize:12, color:'#9ca3af', fontWeight:500}}>OR</span>
                <div style={{flex:1, height:1, background:'#e5e7eb'}}></div>
              </div>

              {/* Form */}
              <form onSubmit={handleSubmit} style={{display:'flex', flexDirection:'column', gap: 14}}>
                <div style={{display:'flex', flexDirection:'column', gap:10}}>
                  <label style={{fontSize:13, fontWeight:600, color:'#111'}}>Tell us about your campaign</label>
                  <div style={{display:'flex', gap: 8, flexWrap:'wrap'}}>
                    <input
                      type="text" placeholder="Full name" required
                      value={name} onChange={e => setName(e.target.value)}
                      style={inputStyle}
                      onFocus={e => e.target.style.boxShadow='0 0 0 2px #1a1a1a'}
                      onBlur={e => e.target.style.boxShadow='none'}
                    />
                    <input
                      type="email" placeholder="Email" required
                      value={email} onChange={e => setEmail(e.target.value)}
                      style={inputStyle}
                      onFocus={e => e.target.style.boxShadow='0 0 0 2px #1a1a1a'}
                      onBlur={e => e.target.style.boxShadow='none'}
                    />
                  </div>
                  <textarea
                    rows={3} placeholder="Tell us about your brand, target market, or upcoming campaign..."
                    required value={message} onChange={e => setMessage(e.target.value)}
                    style={{
                      ...inputStyle, flex: 'none', resize: 'none',
                      width: '100%', display: 'block',
                    }}
                    onFocus={e => e.target.style.boxShadow='0 0 0 2px #1a1a1a'}
                    onBlur={e => e.target.style.boxShadow='none'}
                  />
                </div>

                {/* Service chips */}
                <div style={{display:'flex', flexDirection:'column', gap:8}}>
                  <label style={{fontSize:13, fontWeight:600, color:'#111'}}>I need help with...</label>
                  <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
                    {SERVICES.map(s => {
                      const active = selected.includes(s);
                      return (
                        <button
                          type="button" key={s}
                          onClick={() => toggle(s)}
                          style={{
                            fontSize: 12, fontWeight: 500,
                            padding: '7px 12px', borderRadius: 8,
                            border: active ? '1px solid #1a1a1a' : '1px solid #e5e7eb',
                            background: active ? '#f3f4f6' : '#fff',
                            color: active ? '#111' : '#6b7280',
                            cursor: 'pointer', transition: 'all 0.15s',
                            fontFamily: "'Inter', sans-serif",
                          }}
                        >{s}</button>
                      );
                    })}
                  </div>
                </div>

                <button
                  type="submit" disabled={sending}
                  style={{
                    width: '100%', background: sending ? '#6b7280' : '#1a1a1a',
                    color: '#fff', fontSize: 13, fontWeight: 600,
                    padding: '12px', borderRadius: 16, border: 'none',
                    cursor: sending ? 'default' : 'pointer',
                    transition: 'background 0.2s', fontFamily: "'Inter', sans-serif",
                  }}
                  onMouseEnter={e => { if (!sending) e.currentTarget.style.background='#333'; }}
                  onMouseLeave={e => { if (!sending) e.currentTarget.style.background='#1a1a1a'; }}
                >
                  {sending ? 'Sending...' : 'Send my message'}
                </button>
              </form>
            </>
          )}
        </div>
      );
    }

    // ── App ────────────────────────────────────────────────────────────────────
    function App() {
      return (
        <div style={{minHeight:'100vh', background:'#f0f0f0'}}>
          <Navbar />
          <main style={{
            position: 'relative',
            minHeight: '100vh',
            display: 'flex',
            flexDirection: 'column',
          }}>
            {/* Video background */}
            <video
              autoPlay muted loop playsInline
              style={{
                position: 'absolute', inset: 0,
                width: '100%', height: '100%', objectFit: 'cover',
                zIndex: 0,
              }}
              src={VIDEO_URL}
            />
            {/* Dark overlay for readability */}
            <div style={{
              position: 'absolute', inset: 0,
              background: 'rgba(0,0,0,0.25)', zIndex: 1,
            }} />

            {/* Content layer */}
            <div style={{
              position: 'relative', zIndex: 2,
              display: 'flex', flexDirection: 'row',
              minHeight: '100vh',
              padding: '120px 8% 60px', gap: 40,
              alignItems: 'center',
              justifyContent: 'space-between',
              flexWrap: 'wrap',
            }}>
              {/* Headline */}
              <div style={{flex: '1 1 400px', minWidth: 0}}>
                <p style={{
                  color: '#fff', margin: 0,
                  fontSize: 'clamp(32px, 5vw, 64px)',
                  fontWeight: 500, lineHeight: 1.1,
                  textShadow: '0 2px 12px rgba(0,0,0,0.3)',
                  maxWidth: 600,
                }}>
                  Let's build your brand<br />
                  together across <span style={{
                    fontFamily: "'Instrument Serif', serif",
                    fontStyle: 'italic', fontWeight: 400,
                  }}>East Africa</span>
                </p>
              </div>

              {/* Form card */}
              <div style={{
                width: '100%',
                maxWidth: 480,
                flexShrink: 0,
              }}>
                <ContactForm />
              </div>
            </div>
          </main>
          
          <FIGFooter />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
