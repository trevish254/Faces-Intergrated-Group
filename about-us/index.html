<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Us — Halo / USD Halo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'TT Norms Pro';
      src: url('/fonts/tt-norms-pro-regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'TT Norms Pro';
      src: url('/fonts/tt-norms-pro-semibold.woff2') format('woff2');
      font-weight: 600;
      font-display: swap;
    }
    html, body {
      font-family: 'TT Norms Pro', sans-serif;
      background-color: #F5F5F5;
      margin: 0;
      padding: 0;
    }
    * {
      font-family: inherit;
    }

    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .marquee-track {
      display: flex;
      width: max-content;
      animation: marquee 22s linear infinite;
    }
    @keyframes backers-marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .backers-track {
      display: flex;
      width: max-content;
      animation: backers-marquee 30s linear infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const ArrowRight = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "lucide lucide-arrow-right w-5 h-5 text-black"}>
        <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
      </svg>
    );

    const ArrowRightSmall = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "lucide lucide-arrow-right w-4 h-4 text-black"}>
        <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
      </svg>
    );

    // ─────────────────────────────────────────────────────────────────────────
    // NAVBAR  (matches homepage FIG navbar)
    // ─────────────────────────────────────────────────────────────────────────
    const Navbar = () => {
      const [isOpen, setIsOpen] = useState(false);

      const navLinks = [
        { label: 'Services',    href: '../services/index.html' },
        { label: 'Blog',        href: '../blog/index.html' },
        { label: 'About Us',    href: '../about-us/index.html' },
        { label: 'Contact Us',  href: '../contact-us/index.html' },
        { label: '← Home',     href: '../index.html' },
      ];

      return (
        <div style={{
          width:'100%', position:'fixed', zIndex:99,
          padding:'20px 25px', display:'flex',
          alignItems:'flex-start', justifyContent:'space-between',
          top:0, left:0, pointerEvents:'none',
        }}>
          {/* Logo */}
          <div style={{height:70, overflow:'hidden', pointerEvents:'auto'}}>
            <a href="../index.html">
              <img
                src="../img/Faces-Integrated-Group__1_-removebg-preview.webp"
                alt="FIG Logo"
                style={{height:70, display:'block'}}
              />
            </a>
          </div>

          {/* Right side */}
          <div style={{display:'flex', alignItems:'center', gap:24, pointerEvents:'auto'}}>

            {/* Desktop links — hidden on mobile via Tailwind 'hidden md:flex' */}
            <div style={{
              flexDirection:'row',
              alignItems:'center',
              gap:24,
              background:'rgba(255,255,255,0.88)',
              backdropFilter:'blur(10px)',
              WebkitBackdropFilter:'blur(10px)',
              padding:'12px 20px', borderRadius:50,
              boxShadow:'0 4px 16px rgba(0,0,0,0.06)',
              border:'1px solid rgba(0,0,0,0.06)',
            }} className="hidden md:flex">
              {navLinks.map(link => (
                <a key={link.label} href={link.href} style={{
                  textTransform:'uppercase', textDecoration:'none',
                  color:'#333', fontWeight:500, fontSize:13,
                  fontFamily:'Helvetica, sans-serif',
                  transition:'color 200ms',
                  whiteSpace:'nowrap',
                }}
                onMouseEnter={e => e.currentTarget.style.color='#000'}
                onMouseLeave={e => e.currentTarget.style.color='#333'}
                >
                  {link.label}
                </a>
              ))}
            </div>

            {/* Icons pill (mobile menu) */}
            <div style={{
              padding:'10px', borderRadius:50,
              background:'rgba(247,247,247,0.85)',
              backdropFilter:'blur(8px)',
              display:'flex', alignItems:'center',
            }}>
              <i
                className="ri-menu-fill"
                style={{
                  fontSize:18, margin:'0 16px', fontWeight:100,
                  cursor:'pointer',
                }}
                onClick={() => setIsOpen(!isOpen)}
              />
              <i className="ri-shopping-cart-2-line" style={{fontSize:18, margin:'0 16px', fontWeight:100}} />
            </div>

            {/* Mobile dropdown */}
            {isOpen && (
              <div style={{
                display:'flex',
                flexDirection:'column',
                position:'absolute',
                top:80, right:40,
                background:'rgba(255,255,255,0.97)',
                backdropFilter:'blur(10px)',
                WebkitBackdropFilter:'blur(10px)',
                padding:'20px', borderRadius:12,
                boxShadow:'0 10px 30px rgba(0,0,0,0.1)',
                gap:20, border:'1px solid rgba(0,0,0,0.05)',
                alignItems:'flex-start', zIndex:999,
              }}>
                {navLinks.map(link => (
                  <a key={link.label} href={link.href} style={{
                    textTransform:'uppercase', textDecoration:'none',
                    color:'#333', fontWeight:500, fontSize:14,
                    fontFamily:'Helvetica, sans-serif',
                  }}
                  onClick={() => setIsOpen(false)}
                  >
                    {link.label}
                  </a>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    };

    // ─────────────────────────────────────────────────────────────────────────
    // FIG FOOTER
    // ─────────────────────────────────────────────────────────────────────────
    const FIGFooter = () => {
      const linkStyle = {
        fontSize:17, color:'#000', textDecoration:'none', fontWeight:500,
        fontFamily:'Helvetica, sans-serif', display:'block',
      };
      const labelStyle = {
        marginBottom:18, fontSize:14, opacity:0.5,
        fontFamily:'Helvetica, sans-serif', textTransform:'uppercase',
      };

      return (
        <footer style={{background:'#f0f0f0', paddingBottom:0}}>
          {/* Main footer row */}
          <div style={{
            display:'flex', alignItems:'flex-start', justifyContent:'space-between',
            flexWrap:'wrap', paddingTop:100, paddingBottom:40,
            paddingLeft:'clamp(20px,4vw,60px)', paddingRight:'clamp(20px,4vw,60px)', gap:40,
          }}>

            {/* Connect column */}
            <div style={{display:'flex', flexDirection:'column', gap:8, minWidth:140}}>
              <p style={labelStyle}>CONNECT WITH US</p>
              {['Facebook','Instagram','Twitter','LinkedIn','YouTube'].map(s => (
                <a key={s} href="javascript:void(0);" style={linkStyle}
                  onMouseEnter={e => e.currentTarget.style.opacity='0.6'}
                  onMouseLeave={e => e.currentTarget.style.opacity='1'}>
                  {s}
                </a>
              ))}
            </div>

            {/* Centre: logo + copyright */}
            <div style={{display:'flex', flexDirection:'column', alignItems:'center', flex:'1 1 260px'}}>
              <img
                src="../img/Faces-Integrated-Group__1_-removebg-preview.webp"
                alt="FIG Logo"
                style={{height:120, objectFit:'contain', filter:'grayscale(1) brightness(0) contrast(1)', opacity:0.15}}
              />
              <div style={{marginTop:32, display:'flex', flexWrap:'wrap', justifyContent:'center', gap:'0 24px'}}>
                {['© FACES INTEGRATED GROUP 2026','TERMS OF USE','PRIVACY POLICY'].map(t => (
                  <a key={t} href="javascript:void(0);"
                    style={{textDecoration:'none', color:'#000', opacity:0.5,
                      fontSize:13, fontFamily:'Helvetica, sans-serif'}}>
                    {t}
                  </a>
                ))}
              </div>
            </div>

            {/* Nitty Gritties column */}
            <div style={{display:'flex', flexDirection:'column', gap:8, alignItems:'flex-end', minWidth:140}}>
              <p style={{...labelStyle, textAlign:'right'}}>THE NITTY GRITTIES</p>
              {['Activation FAQs','Retail Audit FAQs','Event Management','Regional Reach','Careers'].map(l => (
                <a key={l} href="javascript:void(0);" style={{...linkStyle, textAlign:'right'}}
                  onMouseEnter={e => e.currentTarget.style.opacity='0.6'}
                  onMouseLeave={e => e.currentTarget.style.opacity='1'}>
                  {l}
                </a>
              ))}
            </div>
          </div>

          {/* Footer blurb */}
          <div style={{
            width:'70%', margin:'0 auto', paddingTop:40, paddingBottom:40,
            textAlign:'center', borderTop:'1px solid rgba(0,0,0,0.08)',
          }}>
            <p style={{fontSize:16, lineHeight:'1.7', color:'rgba(0,0,0,0.6)', fontFamily:'Helvetica, sans-serif'}}>
              Faces Integrated Group (FIG) is a leading experiential marketing and brand activation agency dedicated to helping businesses build stronger connections with their customers through innovative, results-driven marketing solutions. Guided by our motto &quot;WE BUILD BRANDS&quot;, FIG provides end-to-end brand experience solutions including experiential marketing, retail merchandising, event management, creative production, and market auditing for top FMCG brands and corporate organizations across East Africa.
            </p>
          </div>

          {/* Large watermark */}
          <div style={{width:'100%', textAlign:'center', overflow:'hidden', paddingBottom:24, pointerEvents:'none'}}>
            <h1 style={{
              fontSize:'clamp(48px, 9vw, 9vw)',
              fontWeight:700, color:'rgba(30,50,90,0.08)',
              textTransform:'uppercase', lineHeight:1,
              letterSpacing:'-0.04em', whiteSpace:'nowrap',
              fontFamily:'Helvetica, sans-serif',
            }}>
              Faces Integrated Group
            </h1>
          </div>
        </footer>
      );
    };



    function App() {
      return (
        <div className="flex flex-col bg-[#F5F5F5] min-h-screen font-medium">
          <Navbar />
          <div className="h-[55vh] flex flex-col overflow-hidden relative pt-[100px]">
            <div className="flex-1 px-6 pb-6 flex items-end">
              <div className="relative w-full h-full rounded-2xl overflow-hidden">
                <video autoPlay muted loop playsInline className="absolute inset-0 w-full h-full object-cover z-0" src="./About%20Us/Hero%20section.mp4" />
                <div className="relative z-10 flex flex-col items-start justify-end h-full p-8 md:p-12">
                  <h1 className="text-black text-4xl md:text-5xl font-medium leading-tight max-w-xl mb-4" style={{letterSpacing: '-0.04em'}}>
                    We are an experiential marketing agency dedicated to creating immersive brand experiences
                  </h1>
                  <p className="text-black/70 text-base md:text-lg max-w-lg mb-8 leading-relaxed" style={{fontFamily: "'Inter', ui-sans-serif, system-ui, sans-serif"}}>
                    FIG BrandsGroup (FIG) is a dynamic below-the-line experiential marketing agency committed to creating unforgettable brand experiences. We specialize in crafting immersive, interactive, and emotionally engaging campaigns that connect brands with their audiences in meaningful ways.
                  </p>
                  <div className="flex items-center gap-6">
                    <button className="inline-flex items-center gap-3 bg-black text-white text-base md:text-lg font-medium pl-8 pr-2 py-2 rounded-full hover:bg-gray-800 transition-colors duration-200 group">
                      Free Consultation
                      <div className="bg-white rounded-full p-2 group-hover:bg-gray-100 transition-colors">
                        <ArrowRight />
                      </div>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <section className="bg-[#F5F5F5] px-6 py-24">
            <div className="max-w-[88rem] mx-auto">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-12 mb-16 items-start">
                <div>
                  <h2 className="text-black text-4xl md:text-5xl font-medium leading-tight mb-8" style={{letterSpacing: '-0.03em'}}>
                    Why FIG.
                  </h2>
                </div>
                <div>
                  <p className="text-black/70 text-2xl md:text-3xl leading-relaxed">
                    FIG specializes in crafting immersive, interactive, and emotionally engaging campaigns that connect brands with their audiences in meaningful ways.
                  </p>
                </div>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div className="col-span-1 lg:col-span-2 rounded-2xl p-7 min-h-80 flex flex-col justify-between" style={{
                  backgroundImage: "url('./About%20Us/Our%20vision.jpeg')",
                  backgroundSize: 'cover', backgroundPosition: 'center'
                }}>
                  <h3 className="text-white text-2xl font-medium leading-snug" style={{letterSpacing: '-0.02em'}}>Our Vision</h3>
                  <p className="text-white/70 text-base max-w-sm">To be East Africa’s leading below-the-line marketing agency.</p>
                </div>
                
                <div className="bg-[#2B2644] rounded-2xl p-7 min-h-80 flex flex-col justify-between">
                  <h3 className="text-white text-2xl font-medium whitespace-pre-line">Our{"\n"}Mission</h3>
                  <p className="text-white/60 text-base">To deliver innovative marketing solutions that drive brand engagement and sales.</p>
                </div>
                
                <div className="bg-[#2B2644] rounded-2xl p-7 min-h-80 flex flex-col justify-between">
                  <h3 className="text-white text-2xl font-medium whitespace-pre-line">Our Core{"\n"}Values</h3>
                  <p className="text-white/60 text-base">Professionalism<br/>Innovation<br/>Accountability<br/>Results-Driven Approach</p>
                </div>
              </div>
            </div>
          </section>

          <section className="bg-[#F5F5F5] px-6 pb-24 pt-8">
            <div className="max-w-[88rem] mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-8 items-center border-t border-black/5 pt-12">
              <div className="col-span-1 text-center md:text-left">
                <div className="text-5xl font-medium text-black mb-2">47</div>
                <div className="text-black/60 text-sm uppercase tracking-wider font-semibold">County Operations</div>
              </div>
              <div className="col-span-1 text-center md:text-left border-t md:border-t-0 md:border-l border-black/5 pt-8 md:pt-0 md:pl-8">
                <div className="text-5xl font-medium text-black mb-2">20+</div>
                <div className="text-black/60 text-sm uppercase tracking-wider font-semibold">Projects Completed</div>
              </div>
              <div className="col-span-1 text-center md:text-left border-t md:border-t-0 md:border-l border-black/5 pt-8 md:pt-0 md:pl-8">
                <div className="text-5xl font-medium text-black mb-2">10+</div>
                <div className="text-black/60 text-sm uppercase tracking-wider font-semibold">Years of Experience</div>
              </div>
              <div className="col-span-1 text-center md:text-left border-t md:border-t-0 md:border-l border-black/5 pt-8 md:pt-0 md:pl-8">
                <div className="text-5xl font-medium text-black mb-2">100%</div>
                <div className="text-black/60 text-sm uppercase tracking-wider font-semibold">Happy Clients</div>
              </div>
            </div>
          </section>

          <section className="bg-[#F5F5F5] px-6 py-24">
            <div className="max-w-[88rem] mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
              <div className="md:pr-12 md:pt-2">
                <h2 className="text-5xl md:text-6xl font-medium leading-tight mb-6 text-black" style={{letterSpacing: '-0.04em'}}>
                  Let’s Build Your Brand Together – Contact Us Today!
                </h2>
              </div>
              
              <div className="relative rounded-3xl overflow-hidden min-h-[500px] w-full">
                <video autoPlay muted loop playsInline className="absolute inset-0 w-full h-full object-cover z-0" src="./About%20Us/Final%20fig.mp4" />
                
                {/* Overlay content */}
                <div className="relative z-10 p-10 md:p-12 flex flex-col justify-end h-full absolute inset-0">
                  <div className="mt-auto">
                    <h3 className="text-white text-4xl md:text-5xl font-medium leading-tight mb-3" style={{letterSpacing: '-0.03em'}}>
                      Free Consultation
                    </h3>
                    <p className="text-white/70 text-xl md:text-2xl mb-8 font-medium">
                      +2547 20 230 302
                    </p>
                    <a href="../contact-us/index.html" className="inline-flex items-center gap-3 text-white font-medium group w-max group">
                      <div className="w-9 h-9 rounded-full bg-white/80 backdrop-blur flex items-center justify-center group-hover:bg-white transition-colors duration-200">
                        <ArrowRightSmall className="text-black" />
                      </div>
                      Get in Touch
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </section>
          <FIGFooter />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
